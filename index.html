<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content-Security-Policy como meta tag para desarrollo.
      En producción es OBLIGATORIO enviarlo como header HTTP del servidor
      (ver vercel.json / public/_headers) — los meta CSP no cubren todos los vectores.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src    'self' https://fonts.gstatic.com;
        script-src  'self';
        img-src     'self' data:;
        connect-src 'self', https://mi-diary-backend.onrender.com;
      "
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Mi Diario</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
